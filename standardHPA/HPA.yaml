apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ems-worker-edge-d-hpa
  namespace: edge-apps
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ems-worker-edge-d

  minReplicas: 1
  maxReplicas: 7

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 350